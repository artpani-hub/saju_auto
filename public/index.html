<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사주 자동 업로드 봇 - 로컬 대시보드</title>
  <!-- Google Fonts & FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --panel-dark: #12121e;
      --accent-color: #d4af37; /* 골드 */
      --accent-dim: rgba(212, 175, 55, 0.15);
      --text-main: #f3f3f7;
      --text-muted: #8c8c9e;
      --border-color: rgba(212, 175, 55, 0.2);
      --card-bg: rgba(255, 255, 255, 0.02);
      
      /* 주제별 테마 뱃지 색상 */
      --theme-color-saju: #d4af37;
      --theme-color-love: #ff6b8b;
      --theme-color-money: #f39c12;
      --theme-color-job: #1abc9c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* 1. 좌측 사이드바 (날짜 목록) */
    aside {
      width: 300px;
      background-color: var(--panel-dark);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      flex-shrink: 0;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-color);
      letter-spacing: 1.5px;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo i {
      font-size: 24px;
    }

    .nav-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--text-muted);
      margin-bottom: 15px;
      font-weight: 600;
      padding-left: 5px;
    }

    .date-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      flex-grow: 1;
    }

    .date-item {
      padding: 15px 20px;
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 14px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .date-item:hover {
      border-color: var(--accent-color);
      background-color: rgba(212, 175, 55, 0.04);
      transform: translateX(4px);
    }

    .date-item.active {
      background-color: var(--accent-color);
      color: #0f0f15;
      font-weight: 700;
      border-color: var(--accent-color);
    }

    .date-item .date-val {
      font-size: 16px;
    }

    .date-item .topic-badge {
      align-self: flex-start;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      font-weight: 600;
    }

    .date-item.active .topic-badge {
      background-color: rgba(0, 0, 0, 0.85);
      color: var(--accent-color);
    }

    /* 2. 메인 콘텐츠 대시보드 */
    main {
      flex-grow: 1;
      padding: 40px 60px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    header {
      margin-bottom: 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 25px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .selected-title {
      font-size: 15px;
      color: var(--text-muted);
    }

    .selected-title span {
      color: var(--accent-color);
      font-weight: 600;
    }

    /* 채널 배포 상태 */
    .status-container {
      display: flex;
      gap: 15px;
    }

    .status-badge {
      padding: 8px 16px;
      background: var(--panel-dark);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .status-badge i {
      font-size: 15px;
    }

    .status-badge.success { color: #2ecc71; border-color: rgba(46, 204, 113, 0.3); }
    .status-badge.pending { color: #f1c40f; border-color: rgba(241, 196, 15, 0.3); }

    /* 대시보드 그리드 레이아웃 */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 40px;
      flex-grow: 1;
    }

    /* 좌측: 미디어 프리뷰 카드뉴스 & 동영상 */
    .media-column {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .media-card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .media-preview-box {
      background-color: var(--panel-dark);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .img-wrapper {
      position: relative;
      width: 100%;
      padding-top: 100%;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: zoom-in;
    }

    .img-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .img-wrapper:hover img {
      transform: scale(1.03);
    }

    .label-tag {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
    }

    /* 유튜브 쇼츠 플레이어 영역 */
    .video-preview-box {
      background-color: var(--panel-dark);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .video-container {
      width: 250px;
      height: 444px; /* 9:16 비디오 비율 */
      background-color: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 우측: 텍스트 정보 및 카피 클립보드 */
    .info-column {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .text-card {
      background-color: var(--panel-dark);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .text-display-box {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-main);
      white-space: pre-wrap;
      position: relative;
      min-height: 100px;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: rgba(212, 175, 55, 0.15);
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .copy-btn:hover {
      background-color: var(--accent-color);
      color: #0f0f15;
    }

    /* 확대 모달 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(5, 5, 8, 0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal.active {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      max-width: 85%;
      max-height: 85%;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 60px rgba(0, 0, 0, 0.8);
    }

    .close-modal {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
    }

    .close-modal:hover {
      color: var(--accent-color);
    }

    .empty-state {
      text-align: center;
      padding: 150px 0;
      color: var(--text-muted);
      font-size: 18px;
    }
  </style>
</head>
<body>

  <!-- 1. 좌측 사이드바 -->
  <aside>
    <div class="logo">
      <i class="fa-solid fa-moon-astronomy"></i>
      <span>SAJU ROTATOR ✦</span>
    </div>
    
    <div class="nav-title">생성 내역 일자</div>
    <ul class="date-list" id="dateList">
      <!-- 동적 주입 -->
    </ul>
  </aside>

  <!-- 2. 메인 대시보드 -->
  <main id="mainContainer">
    <header>
      <div>
        <h1 id="titleText">사주 로테이션 모니터러</h1>
        <div class="selected-title">선택된 일자: <span id="selectedDateText">-</span></div>
      </div>
      
      <!-- 배포 상태 요약 -->
      <div class="status-container">
        <div class="status-badge success">
          <i class="fa-brands fa-instagram"></i> Instagram 피드 완료
        </div>
        <div class="status-badge success">
          <i class="fa-brands fa-threads"></i> Threads 배포 완료
        </div>
        <div class="status-badge pending" id="ytStatusBadge">
          <i class="fa-brands fa-youtube"></i> YouTube 쇼츠 대기
        </div>
      </div>
    </header>

    <!-- 콘텐츠 대시보드 레이아웃 -->
    <div class="dashboard-grid" id="dashboardGrid" style="display: none;">
      
      <!-- 좌측 칼럼: 미디어 카드뉴스 및 영상 -->
      <div class="media-column">
        <div>
          <div class="section-title"><i class="fa-solid fa-images"></i> 렌더링 카드뉴스 (피드형)</div>
          <div class="media-card-grid">
            
            <div class="media-preview-box">
              <div class="img-wrapper" onclick="openModal(this.querySelector('img').src)">
                <img id="coverImg" src="" alt="표지 이미지">
              </div>
              <div class="label-tag">01. 썸네일 표지 페이지</div>
            </div>

            <div class="media-preview-box">
              <div class="img-wrapper" onclick="openModal(this.querySelector('img').src)">
                <img id="contentImg" src="" alt="본문 이미지">
              </div>
              <div class="label-tag">02. 상세 사주 풀이 페이지</div>
            </div>

          </div>
        </div>

        <div>
          <div class="section-title"><i class="fa-solid fa-clapperboard"></i> 렌더링 숏폼 비디오 (9:16)</div>
          <div class="video-preview-box">
            <div class="video-container">
              <!-- 비디오 요소 (소스는 동적 바인딩) -->
              <video id="shortsVideo" controls loop>
                <source src="" type="video/mp4">
                브라우저가 비디오 재생을 지원하지 않습니다.
              </video>
            </div>
            <div class="label-tag" id="videoLabel">유튜브 릴스/쇼츠 업로드 전용 숏폼 (3단계 활성화 예정)</div>
          </div>
        </div>
      </div>

      <!-- 우측 칼럼: 텍스트 정보 및 카피 클립보드 -->
      <div class="info-column">
        <div class="text-card">
          <div class="section-title"><i class="fa-solid fa-quote-left"></i> 배포 텍스트 및 메타데이터</div>

          <div class="input-group">
            <label>사주 대주제 카테고리</label>
            <div class="text-display-box" id="topicVal" style="min-height: 40px; font-weight:700; color:var(--accent-color);"></div>
          </div>

          <div class="input-group">
            <label>어그로 썸네일 텍스트 (카피문구)</label>
            <div class="text-display-box" id="thumbnailVal">
              <button class="copy-btn" onclick="copyText('thumbnailVal')">복사</button>
              <span class="text-content"></span>
            </div>
          </div>

          <div class="input-group">
            <label>인스타그램 & 스레드 캡션 본문</label>
            <div class="text-display-box" id="captionVal" style="min-height: 200px;">
              <button class="copy-btn" onclick="copyText('captionVal')">복사</button>
              <span class="text-content"></span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 비어있음 경고 -->
    <div class="empty-state" id="emptyState">
      사이드바에서 날짜를 선택하여 주세요.
    </div>
  </main>

  <!-- 상세 이미지 라이트박스 모달 -->
  <div class="modal" id="imageModal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImg" src="" alt="확대 이미지" onclick="event.stopPropagation()">
  </div>

  <script>
    const dateListEl = document.getElementById('dateList');
    const dashboardGridEl = document.getElementById('dashboardGrid');
    const emptyStateEl = document.getElementById('emptyState');
    const selectedDateTextEl = document.getElementById('selectedDateText');

    // 리소스 요소들
    const coverImgEl = document.getElementById('coverImg');
    const contentImgEl = document.getElementById('contentImg');
    const shortsVideoEl = document.getElementById('shortsVideo');
    const topicValEl = document.getElementById('topicVal');
    const thumbnailValEl = document.querySelector('#thumbnailVal .text-content');
    const captionValEl = document.querySelector('#captionVal .text-content');
    
    // 모달 요소들
    const imageModalEl = document.getElementById('imageModal');
    const modalImgEl = document.getElementById('modalImg');

    // 1. 생성일 목록 조회
    async function loadDates() {
      try {
        const response = await fetch('/api/dates');
        const dates = await response.json();
        
        dateListEl.innerHTML = '';
        
        if (dates.length === 0) {
          dateListEl.innerHTML = '<li class="empty-state" style="padding: 20px 0; font-size:13px;">생성된 사주 이력이 없습니다.</li>';
          return;
        }

        for (const date of dates) {
          // 날짜별 상세 메타정보를 함께 조회해와서 리스트 뱃지 표시
          const infoRes = await fetch(`/api/images/${date}`);
          const info = await infoRes.json();

          const li = document.createElement('li');
          li.className = 'date-item';
          li.innerHTML = `
            <span class="date-val">${date}</span>
            <span class="topic-badge">${info.topic}</span>
          `;
          li.onclick = () => selectDate(date, li);
          dateListEl.appendChild(li);
        }

        // 최초 1회 첫 번째 날짜 오토 셀렉트
        if (dates.length > 0) {
          dateListEl.querySelector('.date-item').click();
        }
      } catch (err) {
        console.error('날짜 데이터 로드 에러:', err);
      }
    }

    // 2. 특정 날짜 데이터 활성화 로직
    async function selectDate(date, element) {
      document.querySelectorAll('.date-item').forEach(item => item.classList.remove('active'));
      element.classList.add('active');

      selectedDateTextEl.textContent = date;
      emptyStateEl.style.display = 'none';
      dashboardGridEl.style.display = 'none';

      try {
        const response = await fetch(`/api/images/${date}`);
        const data = await response.json();

        // 데이터 바인딩
        topicValEl.textContent = data.topic;
        thumbnailValEl.textContent = data.thumbnailText;
        
        // 인스타그램 규격 캡션 생성 시뮬레이션
        captionValEl.textContent = `[${data.date} 오늘의 ${data.topic} 운세]\n\n${data.contentText}\n\n#사주 #운세 #${data.topic.replace('/', '_')} #오늘의운세 #사주자동업로드봇`;

        coverImgEl.src = data.coverUrl || '';
        contentImgEl.src = data.contentUrl || '';

        // 비디오 소스 바인딩 및 플레이어 리로드
        if (data.videoUrl) {
          shortsVideoEl.querySelector('source').src = data.videoUrl;
          shortsVideoEl.load();
          document.getElementById('ytStatusBadge').className = "status-badge success";
          document.getElementById('ytStatusBadge').innerHTML = '<i class="fa-brands fa-youtube"></i> YouTube 쇼츠 완료';
        } else {
          shortsVideoEl.querySelector('source').src = '';
          shortsVideoEl.load();
          document.getElementById('ytStatusBadge').className = "status-badge pending";
          document.getElementById('ytStatusBadge').innerHTML = '<i class="fa-brands fa-youtube"></i> YouTube 쇼츠 대기';
        }

        dashboardGridEl.style.display = 'grid';
      } catch (err) {
        console.error(err);
        emptyStateEl.style.display = 'block';
        emptyStateEl.textContent = '데이터를 로드하는 데 오류가 발생했습니다.';
      }
    }

    // 3. 클립보드 복사 헬퍼
    function copyText(elementId) {
      const text = document.querySelector(`#${elementId} .text-content`).textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert('클립보드에 복사되었습니다!');
      });
    }

    // 4. 이미지 모달 제어
    function openModal(imgUrl) {
      modalImgEl.src = imgUrl;
      imageModalEl.classList.add('active');
    }

    function closeModal() {
      imageModalEl.classList.remove('active');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    loadDates();
  </script>
</body>
</html>
